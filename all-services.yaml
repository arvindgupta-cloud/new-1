# ===========================
# Home Service
# ===========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-service
  template:
    metadata:
      labels:
        app: home-service
    spec:
      containers:
      - name: home-service
        image: asia-south1-docker.pkg.dev/qwiklabs-gcp-02-cbbeb1aab496/my-repo/home-service:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: home-service
spec:
  selector:
    app: home-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
  type: ClusterIP

