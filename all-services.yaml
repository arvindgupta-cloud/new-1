# ===========================
# Ingress (GKE GCE)
# ===========================
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - http:
      paths:
      - path: /about
        pathType: Prefix
        backend:
          service:
            name: about-service
            port:
              name: http
      - path: /contact
        pathType: Prefix
        backend:
          service:
            name: contact-service
            port:
              name: http
      - path: /shop
        pathType: Prefix
        backend:
          service:
            name: shop-service
            port:
              name: http
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-service
            port:
              name: http
